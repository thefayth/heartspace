<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Heartspace workflow overview</title>
  <desc id="desc">High-level public workflow showing private user context moving through Heartspace modes, safety review, user-owned output, and public project surfaces.</desc>
  <rect width="1280" height="720" fill="#fffaf2"/>
  <rect x="54" y="60" width="1172" height="600" rx="28" fill="#ffffff" stroke="#ead9d3" stroke-width="3"/>
  <text x="92" y="122" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#2a071f">Heartspace workflow overview</text>
  <text x="92" y="158" font-family="Arial, sans-serif" font-size="18" fill="#65445b">Private reflection, ethical review, user-owned output, public project surface.</text>
  <g font-family="Arial, sans-serif" font-size="18" fill="#2a071f">
    <rect x="92" y="250" width="170" height="84" rx="12" fill="#f8d7dc" stroke="#d84f72"/>
    <text x="122" y="285">Adult user</text>
    <text x="116" y="311" font-size="14" fill="#65445b">private context</text>
    <rect x="332" y="230" width="190" height="124" rx="12" fill="#f3ebe8" stroke="#c88932"/>
    <text x="370" y="266">Heartspace</text>
    <text x="365" y="292" font-size="14" fill="#65445b">message lab</text>
    <text x="365" y="314" font-size="14" fill="#65445b">date prep</text>
    <text x="365" y="336" font-size="14" fill="#65445b">memory</text>
    <rect x="592" y="250" width="190" height="84" rx="12" fill="#dcefea" stroke="#075f62"/>
    <text x="625" y="285">Safety review</text>
    <text x="624" y="311" font-size="14" fill="#43635f">consent and honesty</text>
    <rect x="852" y="250" width="170" height="84" rx="12" fill="#f8d7dc" stroke="#d84f72"/>
    <text x="884" y="285">Next step</text>
    <text x="883" y="311" font-size="14" fill="#65445b">user-owned</text>
    <rect x="1080" y="220" width="110" height="58" rx="10" fill="#ffffff" stroke="#075f62"/>
    <text x="1104" y="255" font-size="15">GitHub</text>
    <rect x="1080" y="306" width="110" height="58" rx="10" fill="#ffffff" stroke="#075f62"/>
    <text x="1095" y="341" font-size="15">WordPress</text>
  </g>
  <g stroke="#7d6474" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M262 292 H332"/>
    <path d="M522 292 H592"/>
    <path d="M782 292 H852"/>
    <path d="M1022 292 C1048 292 1058 249 1080 249"/>
    <path d="M1022 292 C1048 292 1058 335 1080 335"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7d6474"/>
    </marker>
  </defs>
</svg>

